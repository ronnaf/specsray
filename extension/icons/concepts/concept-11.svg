<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="#05070b"/>

  <!-- outer halo -->
  <g fill="#7fe0ff" opacity="0.12">
    <ellipse cx="64" cy="27" rx="18" ry="16"/>
    <ellipse cx="64" cy="48" rx="26" ry="18"/>
    <ellipse cx="64" cy="90" rx="36" ry="42"/>
  </g>

  <!-- body: head / thorax / elytra, three clear masses -->
  <g fill="#7fe0ff" fill-opacity="0.30" stroke="#cdf4ff" stroke-width="3.25">
    <ellipse cx="64" cy="27" rx="14" ry="12"/>
    <ellipse cx="64" cy="47" rx="22" ry="14"/>
    <ellipse cx="64" cy="89" rx="30" ry="37"/>
  </g>

  <!-- spine + one soft rib, the interior x-ray cue kept minimal -->
  <g stroke="#cdf4ff" fill="none" stroke-linecap="round">
    <line x1="64" y1="17" x2="64" y2="124" stroke-width="3" stroke-opacity="0.6"/>
    <path d="M42 68 Q64 76 86 68" stroke-width="2" stroke-opacity="0.35"/>
  </g>
  <g fill="#cdf4ff" fill-opacity="0.55">
    <circle cx="58" cy="23" r="2.2"/>
    <circle cx="70" cy="23" r="2.2"/>
  </g>

  <!-- legs: three bold, two-segment legs per side -->
  <g id="legs-r" fill="none" stroke="#a8ecff" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M85 42 L107 36 L102 52"/>
    <path d="M90 68 L115 72 L106 88"/>
    <path d="M86 100 L106 110 L98 122"/>
  </g>
  <use href="#legs-r" transform="translate(128,0) scale(-1,1)"/>

  <!-- antennae -->
  <g id="antenna-r" fill="none" stroke="#a8ecff" stroke-width="6.5" stroke-linecap="round">
    <path d="M71 16 Q84 3 95 4"/>
  </g>
  <use href="#antenna-r" transform="translate(128,0) scale(-1,1)"/>
</svg>
