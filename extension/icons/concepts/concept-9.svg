<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="#05070b"/>

  <!-- outer halo (fake glow: a bigger, fainter copy of the body, no blur) -->
  <g fill="#7fe0ff" opacity="0.10">
    <ellipse cx="64" cy="26" rx="17" ry="15"/>
    <ellipse cx="64" cy="46" rx="27" ry="19"/>
    <ellipse cx="64" cy="87" rx="35" ry="42"/>
  </g>

  <!-- body: head / thorax / elytra, translucent cyan -->
  <g fill="#7fe0ff" fill-opacity="0.22" stroke="#bdf0ff" stroke-width="2.5">
    <ellipse cx="64" cy="26" rx="13" ry="11"/>
    <ellipse cx="64" cy="46" rx="21" ry="14"/>
    <ellipse cx="64" cy="87" rx="29" ry="36"/>
  </g>

  <!-- interior skeleton hints -->
  <g stroke="#bdf0ff" stroke-opacity="0.55" fill="none" stroke-width="2" stroke-linecap="round">
    <line x1="64" y1="18" x2="64" y2="118"/>
    <path d="M46 44 Q64 50 82 44"/>
    <path d="M40 66 Q64 74 88 66"/>
    <path d="M38 92 Q64 100 90 92"/>
    <path d="M42 112 Q64 118 86 112"/>
  </g>
  <g fill="#bdf0ff" fill-opacity="0.5">
    <circle cx="58" cy="22" r="2.4"/>
    <circle cx="70" cy="22" r="2.4"/>
  </g>

  <!-- legs: build the right side, mirror it for the left -->
  <g id="legs-r" fill="none" stroke="#a8ecff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M84 38 L103 25 L111 39 L106 46"/>
    <path d="M89 60 L111 64 L117 81 L110 85"/>
    <path d="M86 97 L107 105 L109 119 L102 121"/>
  </g>
  <use href="#legs-r" transform="translate(128,0) scale(-1,1)"/>

  <!-- antennae -->
  <g id="antenna-r" fill="none" stroke="#a8ecff" stroke-width="5.5" stroke-linecap="round">
    <path d="M71 17 Q82 4 92 3 Q97 3 93 9"/>
  </g>
  <use href="#antenna-r" transform="translate(128,0) scale(-1,1)"/>
</svg>
