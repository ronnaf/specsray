<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="#182338"/>
  <!-- radiating tick marks -->
  <g stroke="#ffc233" stroke-width="6" stroke-linecap="round">
    <line x1="64" y1="14" x2="64" y2="26"/>
    <line x1="64" y1="102" x2="64" y2="114"/>
    <line x1="14" y1="64" x2="26" y2="64"/>
    <line x1="102" y1="64" x2="114" y2="64"/>
    <line x1="30" y1="30" x2="38" y2="38"/>
    <line x1="98" y1="30" x2="90" y2="38"/>
    <line x1="30" y1="98" x2="38" y2="90"/>
    <line x1="98" y1="98" x2="90" y2="90"/>
  </g>
  <!-- lens/eye ring -->
  <circle cx="64" cy="64" r="24" fill="none" stroke="#f2f4f8" stroke-width="9"/>
  <!-- pupil -->
  <circle cx="64" cy="64" r="9" fill="#ffc233"/>
